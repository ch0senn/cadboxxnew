    <script>
        //color randomizer
        AFRAME.registerComponent('color-randomizer', {
            play: function () {
                this.el.addEventListener('drag-drop', function (evt) {
                    evt.detail.dropped.setAttribute('material', 'color',
                        '#' + (Math.random() * 0xFFFFFF << 0).toString(16))
                    // color randomizer credit: http://stackoverflow.com/questions/1484506/random-color-generator-in-javascript#comment6801353_5365036
                })
            }
        })
        // forward mouse and touch events to the super-hands entity
        AFRAME.registerComponent('capture-mouse', {
            init: function () {
                this.eventRepeater = this.eventRepeater.bind(this)
                this.el.sceneEl.addEventListener('loaded', () => {
                    this.el.sceneEl.canvas.addEventListener('mousedown', this.eventRepeater)
                    this.el.sceneEl.canvas.addEventListener('mouseup', this.eventRepeater)
                    this.el.sceneEl.canvas.addEventListener('touchstart', this.eventRepeater)
                    this.el.sceneEl.canvas.addEventListener('touchmove', this.eventRepeater)
                    this.el.sceneEl.canvas.addEventListener('touchend', this.eventRepeater)
                }, { once: true })
            },
            eventRepeater: function (evt) {
                if (evt.type.startsWith('touch')) {
                    evt.preventDefault()
                    // avoid repeating touchmove because it interferes with look-controls
                    if (evt.type === 'touchmove') { return }
                }
                this.el.emit(evt.type, evt.detail)
            }
        })
    </script>

    <script type="text/javascript">
        if (window.AFRAME == null) {
            console.error("aframe not found, please import it before this component.")
        }

        AFRAME.registerSystem("track-cursor", {
            init: function () {
                this.el.setAttribute("cursor", { rayOrigin: "mouse" });
            }
        });

        AFRAME.registerComponent("track-cursor", {
            init: function () {
                this.el.addEventListener("mousedown", e => {
                    if (this.el.is("cursor-hovered")) {
                        this.el.sceneEl.camera.el.setAttribute("look-controls", {
                            enabled: false
                        });
                        this.el.addState("dragging");
                    }
                })
                this.el.addEventListener("click", e => {
                    if (this.el.is("dragging")) {
                        this.el.sceneEl.camera.el.setAttribute("look-controls", {
                            enabled: true
                        });
                        this.el.removeState("dragging");
                    }
                })
            },
        });

        AFRAME.registerComponent("dragndrop", {
            dependencies: ["track-cursor"],
            init: function () {
                this.range = 0;
                this.dist = 0;

                this.el.addEventListener("stateadded", e => {
                    if (e.detail == "dragging") {
                        this.range = 0;
                        this.dist = this.el.object3D.position
                            .clone()
                            .sub(this.el.sceneEl.camera.el.object3D.position)
                            .length();
                    }
                })

                this.direction = new AFRAME.THREE.Vector3();
                this.target = new AFRAME.THREE.Vector3();
                document.addEventListener("wheel", e => {
                    if (e.deltaY < 0) {
                        this.range += 0.1;
                    } else {
                        this.range -= 0.1;
                    }
                });
            },
            updateDirection: function () {
                this.direction.copy(this.el.sceneEl.getAttribute("raycaster").direction);
            },
            updateTarget: function () {
                let camera = this.el.sceneEl.camera.el
                this.target.copy(
                    camera.object3D.position
                        .clone()
                        .add(this.direction.clone().multiplyScalar(this.dist + this.range))
                );
            },
            tick: function () {
                if (this.el.is("dragging")) {
                    this.updateDirection();
                    this.updateTarget();
                    this.el.object3D.position.copy(this.target);
                }
            }
        });
    </script>

    <script>
        AFRAME.registerComponent('click-impulse', {
            init: function () {
                var el = this.el;

                el.addEventListener('click', function () {
                    el.body.applyImpulse(
                        /* impulse */
                        new CANNON.Vec3(
                            THREE.Math.randInt(-20, 20),
                            THREE.Math.randInt(-20, 20),
                            THREE.Math.randInt(-20, 20)
                        ),
                                                                                                                                        /* world position */ new CANNON.Vec3().copy(el.getDOMAttribute('position'))
                    );
                });

            }
        });

        // forward mouse and touch events to the super-hands entity
        AFRAME.registerComponent('capture-mouse', {
            init: function () {
                this.eventRepeater = this.eventRepeater.bind(this)
                this.el.sceneEl.addEventListener('loaded', () => {
                    this.el.sceneEl.canvas.addEventListener('mousedown', this.eventRepeater)
                    this.el.sceneEl.canvas.addEventListener('mouseup', this.eventRepeater)
                    this.el.sceneEl.canvas.addEventListener('touchstart', this.eventRepeater)
                    this.el.sceneEl.canvas.addEventListener('touchmove', this.eventRepeater)
                    this.el.sceneEl.canvas.addEventListener('touchend', this.eventRepeater)
                }, { once: true })
            },
            eventRepeater: function (evt) {
                if (evt.type.startsWith('touch')) {
                    evt.preventDefault()
                    // avoid repeating touchmove because it interferes with look-controls
                    if (evt.type === 'touchmove') { return }
                }
                this.el.emit(evt.type, evt.detail)
            }
        })
    </script>

<script>
  const dropzone = document.getElementById('dropzone');
  const modelsContainer = document.getElementById('models');
  const camera = document.getElementById('camera');

  // Prevent default drag behaviors
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    window.addEventListener(eventName, e => e.preventDefault(), false);
  });

  // Highlight drop area
  ['dragenter', 'dragover'].forEach(eventName => {
    window.addEventListener(eventName, () => {
      dropzone.style.background = 'rgba(0,0,0,0.6)';
    }, false);
  });

  ['dragleave', 'drop'].forEach(eventName => {
    window.addEventListener(eventName, () => {
      dropzone.style.background = 'rgba(0,0,0,0.3)';
    }, false);
  });

  // Function to add GLB to the scene
  function addGLBModel(file) {
    if (!file.name.endsWith('.glb')) {
      alert('Please drop a .glb file');
      return;
    }

    const url = URL.createObjectURL(file);

    // Create a new entity for this model
    const entity = document.createElement('a-entity');
    entity.setAttribute('gltf-model', url);

    // Random position in front of the camera
    //const camPos = camera.getAttribute('position');
    //const xOffset = (Math.random() - 0.5) * 2;
    //const yOffset = Math.random() * 1 + 0.5;
    //const zOffset = -2 - Math.random() * 1.5; // in front of camera
    entity.setAttribute('position', {
      x: 0,  //camPos.x + xOffset,
      y: 0, //camPos.y + yOffset,
      z: 0 //camPos.z + zOffset
    });

    entity.setAttribute('scale', '1 1 1');

    // Add simple rotation on drag
    let isDragging = false;
    let previousX;

    entity.addEventListener('mousedown', e => {
      isDragging = true;
      previousX = e.clientX;
    });

    window.addEventListener('mouseup', () => isDragging = false);

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const deltaX = e.clientX - previousX;
      previousX = e.clientX;
      const rotation = entity.getAttribute('rotation');
      entity.setAttribute('rotation', {
        x: rotation.x,
        y: rotation.y + deltaX * 0.5,
        z: rotation.z
      });
    });

    // Add scroll to scale
    window.addEventListener('wheel', e => {
      const scale = entity.getAttribute('scale');
      const factor = e.deltaY < 0 ? 1.05 : 0.95;
      entity.setAttribute('scale', {
        x: scale.x * factor,
        y: scale.y * factor,
        z: scale.z * factor
      });
    });

    modelsContainer.appendChild(entity);
  }

  // Handle dropped files
  window.addEventListener('drop', e => {
    const files = e.dataTransfer.files;
    if (files.length === 0) return;

    dropzone.style.display = 'none';

    for (let i = 0; i < files.length; i++) {
      addGLBModel(files[i]);
    }
  });
</script>
